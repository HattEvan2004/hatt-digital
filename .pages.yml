# Pages CMS configuration — https://pagescms.org
#
# Hatt Digital is a hand-coded static HTML site (no markdown/frontmatter),
# so each page is exposed for raw-HTML editing and the assets/ folder is
# exposed for image upload/replace. Edit pages under "Content" and manage
# images under "Media" in the Pages CMS dashboard.

media:
  input: assets          # folder (in the repo) where images live
  output: /assets        # public URL prefix used when inserting media
  extensions: [jpg, jpeg, png, webp, svg, gif, ico, pdf]

content:
  # ---- Main pages ----
  - name: home
    label: Home
    type: file
    path: index.html
    format: code
    fields:
      - { name: body, label: Page HTML, type: code, options: { language: html } }

  - name: services
    label: Services
    type: file
    path: services.html
    format: code
    fields:
      - { name: body, label: Page HTML, type: code, options: { language: html } }

