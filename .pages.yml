      - name: s5
        label: "Step 5 — Optional details"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: note, label: "Note", type: text }
      - { name: submit, label: "Submit button label", type: string }
      - { name: foot, label: "Note under the submit button", type: text }

