  - name: quote
    label: Quote page
    type: file
    path: _data/quote.json
    fields:
      - name: seo
        label: Browser tab & search engine
        type: object
        fields:
          - { name: title, label: "Page title", type: string }
          - { name: description, label: "Search description", type: text }
      - { name: og_description, label: "Social share description", type: text }
      - name: hero
        label: Hero — top of the page
