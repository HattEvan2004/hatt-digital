# Pages CMS configuration — https://pagescms.org
# Edit this site at https://app.pagescms.org (sign in with GitHub, no install).
# Saving here commits to GitHub and the site rebuilds & deploys automatically.
#
# The Home page is fully structured: you edit clean labelled boxes (headings,
# paragraphs, lists) and never touch HTML. The remaining pages are still
# available for advanced raw-HTML editing under "Other pages (HTML)" until they
# are converted to structured fields too.

media:
  input: assets
  output: /assets
  extensions: [jpg, jpeg, png, webp, svg, gif, ico, pdf]

content:
  # ─────────────────────────────  HOME PAGE  ─────────────────────────────
  - name: home
    label: Home page
    type: file
    path: _data/home.json
    fields:
      - name: seo
        label: Browser tab & search engine
        type: object
        fields:
          - { name: title, label: "Page title (browser tab & Google)", type: string }
          - { name: description, label: "Search description", type: text }
      - name: hero
        label: Hero — top of the page
        type: object
        fields:
          - { name: eyebrow, label: "Small tag above the headline", type: string }
          - name: title
            label: "Headline"
            type: text
            description: "Wrap the words you want highlighted in **double asterisks**. e.g. Websites that make local businesses look **impossible to ignore.**"
          - { name: sub, label: "Intro sentence", type: text }
          - { name: cta_primary, label: "Primary button label", type: string }
          - { name: cta_secondary, label: "Secondary button label", type: string }
      - name: why
        label: "“Why it matters” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - { name: lead_heading, label: "Lead card — heading", type: string }
          - { name: lead_body, label: "Lead card — paragraph", type: text }
          - name: stats
            label: "Stat boxes"
            type: object
            list: true
            fields:
              - { name: value, label: "Big number / label", type: string }
              - { name: label, label: "Caption", type: string }
          - name: tiles
            label: "Feature tiles"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: text, label: "Text", type: text }
      - name: start
        label: "“Start your website” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: body, label: "Paragraph", type: text }
          - { name: card_heading, label: "“How it works” card — heading", type: string }
          - name: steps
            label: "“How it works” steps"
            type: string
            list: true
      - name: work
        label: "Portfolio preview"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - { name: viewall, label: "“View portfolio” button label", type: string }
          - name: cases
            label: "Case study cards"
            type: object
            list: true
            fields:
              - { name: image, label: "Screenshot", type: image }
              - { name: alt, label: "Image alt text", type: string }
              - { name: w, label: "Image width (advanced)", type: string }
              - { name: h, label: "Image height (advanced)", type: string }
              - { name: type, label: "Category line", type: string }
              - { name: title, label: "Title", type: string }
              - { name: desc, label: "Description", type: text }
              - { name: focus, label: "“What I focused on” bullets", type: string, list: true }
              - { name: bestfor, label: "“Best for” text", type: string }
              - { name: link, label: "Preview link (URL)", type: string }
      - name: pricing
        label: "Packages"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - { name: foot, label: "Footnote under the packages", type: text }
          - name: tiers
            label: "Package cards"
            type: object
            list: true
            fields:
              - { name: name, label: "Package name", type: string }
              - { name: label, label: "Short label", type: string }
              - { name: sub, label: "Description", type: text }
              - { name: features, label: "Feature bullets", type: string, list: true }
              - { name: button, label: "Button label", type: string }
              - { name: package, label: "Quote tag (starter / business / growth)", type: string }
              - { name: featured, label: "Highlight as “best for most”?", type: boolean }
              - { name: badge, label: "Badge text (only if highlighted)", type: string }
      - name: earns
        label: "“Earns its keep” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - name: steps
            label: "Flow steps"
            type: object
            list: true
            fields:
              - { name: tag, label: "Tag (e.g. Land, Trust, Act, Lead)", type: string }
              - { name: title, label: "Title", type: string }
              - { name: text, label: "Text", type: text }
              - { name: d, label: "Animation delay (advanced, e.g. .1s)", type: string }
      - name: whyhd
        label: "“Why Hatt Digital” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - name: points
            label: "Trust points"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: text, label: "Text", type: string }
      - name: diy
        label: "“DIY vs done-for-you” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - { name: cta_heading, label: "Call-out — heading", type: string }
          - { name: cta_body, label: "Call-out — paragraph", type: text }
          - name: cards
            label: "Reason cards"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: text, label: "Text", type: text }
      - name: local
        label: "“Local & direct” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: body1, label: "Paragraph 1", type: text }
          - { name: body2, label: "Paragraph 2", type: text }
          - { name: button, label: "Button label", type: string }
      - name: process
        label: "Process"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - name: steps
            label: "Steps"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: text, label: "Text", type: text }
      - name: reviews
        label: "Reviews"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - name: quotes
            label: "Review cards"
            type: object
            list: true
            fields:
              - { name: quote, label: "Quote", type: text }
              - { name: who, label: "Attribution", type: string }
          - name: invite
            label: "“Have we worked together?” card"
            type: object
            fields:
              - { name: title, label: "Heading", type: string }
              - { name: text, label: "Text", type: text }
      - name: faq
        label: "FAQ preview"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - { name: cta_heading, label: "Call-out — heading", type: string }
          - { name: cta_body, label: "Call-out — paragraph", type: text }
          - name: items
            label: "FAQ items"
            type: object
            list: true
            fields:
              - { name: q, label: "Question", type: string }
              - { name: a, label: "Answer", type: text }
      - name: cta
        label: "Final call-to-action"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: body, label: "Paragraph", type: text }

  # ──────────────────────────  SITE & CONTACT  ──────────────────────────
  - name: site
    label: Site & contact
    type: file
    path: _data/site.json
    fields:
      - name: contact
        label: Contact details (used across the site)
        type: object
        fields:
          - { name: phone, label: "Phone (shown on the page)", type: string }
          - { name: phone_link, label: "Phone (dial format, e.g. +19022774424)", type: string }
          - { name: email, label: "Email", type: string }
      - name: social
        label: Social links
        type: object
        fields:
          - { name: facebook, label: "Facebook URL", type: string }
          - { name: instagram, label: "Instagram URL", type: string }
      - name: footer
        label: Footer
        type: object
        fields:
          - { name: blurb, label: "Short blurb under the logo", type: text }

  # ───────────────  OTHER PAGES (advanced raw-HTML editing)  ───────────────
  # These are still hand-coded HTML. You can edit them here, but you are editing
  # raw HTML — take care not to break tags. They will be converted to friendly
  # structured fields (like the Home page above) in a later update.
  - name: services
    label: Services page
    type: file
    path: _data/services.json
    fields:
      - name: seo
        label: Browser tab & search engine
        type: object
        fields:
          - { name: title, label: "Page title", type: string }
          - { name: description, label: "Search description", type: text }
      - name: hero
        label: Hero — top of the page
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - name: heading
            label: "Heading"
            type: string
            description: "Wrap the highlighted part in **double asterisks**."
          - { name: lead, label: "Intro sentence", type: text }
      - name: list
        label: "Service list"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
          - name: items
            label: "Services"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: body, label: "Description", type: text }
              - { name: features, label: "Feature bullets", type: string, list: true }
              - { name: tag, label: "Tag (e.g. Included, Optional)", type: string }
      - name: pricing_mini
        label: "Packages call-out (note: the packages themselves are edited on the Home page)"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: body, label: "Paragraph", type: text }
      - name: who
        label: "“Who it’s for” section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro paragraph", type: text }
      - name: cta
        label: "Final call-to-action"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: body, label: "Paragraph", type: text }

  - name: projects
    label: "Portfolio (HTML)"
    type: file
    path: projects.html
    format: code
    fields:
      - { name: body, label: Page HTML, type: code, options: { language: html } }

