          - { name: lead, label: "Intro sentence", type: text }
          - { name: note, label: "Small note under the intro", type: text }
      - { name: form_lead, label: "Friendly note above the form", type: text }
      - { name: success, label: "Message shown after a successful submit", type: text }
      - name: s1
        label: "Step 1 — Website type"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: note, label: "Note", type: text }
      - name: packages
        label: "Website-type cards (copy only)"
        type: object
        list: true
        fields:
          - { name: label, label: "Label", type: string }
          - { name: desc, label: "Description", type: text }
      - name: s2
        label: "Step 2 — Budget"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: note, label: "Note", type: text }
          - { name: unsure, label: "“Not sure” checkbox label", type: text }
      - name: s3
        label: "Step 3 — Basic details"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: hint, label: "Hint under the fields", type: text }
      - name: s4
        label: "Step 4 — Project goals"
        type: object
        fields:
