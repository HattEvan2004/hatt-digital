<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 813" width="1300" height="813" role="img" aria-label="Toner Supplies website preview">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8FF"/>
      <stop offset="1" stop-color="#1267FF"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1D35"/>
      <stop offset="1" stop-color="#102b52"/>
    </linearGradient>
  </defs>

  <!-- page -->
  <rect width="1300" height="813" fill="#F7FAFC"/>

  <!-- browser chrome -->
  <rect width="1300" height="56" fill="#0B1D35"/>
  <circle cx="34" cy="28" r="7" fill="#ff6058"/>
  <circle cx="58" cy="28" r="7" fill="#ffbd2e"/>
  <circle cx="82" cy="28" r="7" fill="#28ca42"/>
  <rect x="120" y="16" width="640" height="24" rx="7" fill="#16314F"/>
  <text x="140" y="33" font-family="'JetBrains Mono',monospace" font-size="14" fill="#8A9BB8">toner-supplies-demo-v2.vercel.app</text>

  <!-- nav -->
  <rect x="0" y="56" width="1300" height="74" fill="#FFFFFF"/>
  <rect x="60" y="80" width="26" height="26" rx="7" fill="url(#brand)"/>
  <text x="98" y="99" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="20" fill="#071426">Toner Supplies</text>
  <rect x="760" y="86" width="60" height="10" rx="5" fill="#DDE7F3"/>
  <rect x="848" y="86" width="60" height="10" rx="5" fill="#DDE7F3"/>
  <rect x="936" y="86" width="60" height="10" rx="5" fill="#DDE7F3"/>
  <rect x="1044" y="76" width="150" height="32" rx="16" fill="url(#brand)"/>
  <text x="1119" y="97" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="14" fill="#fff">Get a quote</text>

  <!-- hero -->
  <rect x="60" y="166" width="1180" height="300" rx="20" fill="url(#hero)"/>
  <text x="104" y="250" font-family="'JetBrains Mono',monospace" font-size="15" letter-spacing="3" fill="#14B8FF">TONER / OFFICE SUPPLIES</text>
  <text x="100" y="312" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="46" fill="#FFFFFF">Toner &amp; office supplies,</text>
  <text x="100" y="366" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="46" fill="#FFFFFF">easy to browse and order.</text>
  <rect x="100" y="396" width="190" height="44" rx="22" fill="url(#brand)"/>
  <text x="195" y="424" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="16" fill="#fff">Request a quote</text>
  <rect x="306" y="396" width="150" height="44" rx="22" fill="none" stroke="#33507a" stroke-width="1.5"/>
  <text x="381" y="424" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="16" fill="#cdd9f5">Browse products</text>

  <!-- product cards -->
  <g>
    <rect x="60" y="506" width="372" height="250" rx="16" fill="#FFFFFF" stroke="#DDE7F3"/>
    <rect x="60" y="506" width="372" height="120" rx="16" fill="#EEF3FB"/>
    <rect x="150" y="540" width="192" height="52" rx="10" fill="url(#brand)" opacity="0.85"/>
    <rect x="88" y="650" width="150" height="14" rx="7" fill="#071426"/>
    <rect x="88" y="680" width="240" height="10" rx="5" fill="#DDE7F3"/>
    <rect x="88" y="700" width="200" height="10" rx="5" fill="#DDE7F3"/>

    <rect x="464" y="506" width="372" height="250" rx="16" fill="#FFFFFF" stroke="#DDE7F3"/>
    <rect x="464" y="506" width="372" height="120" rx="16" fill="#EEF3FB"/>
    <rect x="554" y="540" width="192" height="52" rx="10" fill="#0B1D35" opacity="0.85"/>
    <rect x="492" y="650" width="150" height="14" rx="7" fill="#071426"/>
    <rect x="492" y="680" width="240" height="10" rx="5" fill="#DDE7F3"/>
    <rect x="492" y="700" width="200" height="10" rx="5" fill="#DDE7F3"/>

    <rect x="868" y="506" width="372" height="250" rx="16" fill="#FFFFFF" stroke="#DDE7F3"/>
    <rect x="868" y="506" width="372" height="120" rx="16" fill="#EEF3FB"/>
    <rect x="958" y="540" width="192" height="52" rx="10" fill="url(#brand)" opacity="0.6"/>
    <rect x="896" y="650" width="150" height="14" rx="7" fill="#071426"/>
    <rect x="896" y="680" width="240" height="10" rx="5" fill="#DDE7F3"/>
    <rect x="896" y="700" width="200" height="10" rx="5" fill="#DDE7F3"/>
  </g>
</svg>
